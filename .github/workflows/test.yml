name: Test Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ secrets.CI_DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.CI_DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync

      - name: Create .env for tests
        run: |
          cp config/.env.template config/.env

          echo "DJANGO_SECRET_KEY=${{ secrets.CI_DJANGO_SECRET_KEY }}" >> config/.env
          echo "POSTGRES_USER=${{ secrets.CI_DB_USER }}" >> config/.env
          echo "POSTGRES_PASSWORD=${{ secrets.CI_DB_PASSWORD }}" >> config/.env
          echo "POSTGRES_DB=${{ secrets.CI_DB_NAME }}" >> config/.env
          echo "DJANGO_DATABASE_HOST=localhost" >> config/.env
          echo "DJANGO_DATABASE_PORT=5432" >> config/.env
      
      - name: Run Ruff (Linter)
        run: uv run ruff check .

      - name: Run Mypy (Type Checker)
        run: uv run mypy .

      - name: Run Pytest (Unit Tests & Coverage)
        run: uv run pytest
