---

# Default compose file for development and production.
# Should be used directly in development.
# Automatically loads `docker-compose.override.yml` if it exists.
# No extra steps required.
# Should be used together with `docker/docker-compose.prod.yml`
# in production.

services:
  db:
    image: "postgres:18-alpine"
    restart: unless-stopped
    volumes:
      # Postgres 18 default PGDATA is `/var/lib/postgresql/18/docker`,
      # so we mount the parent directory to persist the actual data path.
      - postgres-data:/var/lib/postgresql
    networks:
      - postgres-net
    env_file: ./config/.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 30s
      retries: 5
      start_period: 5s

  web:
    build:
      context: .
      target: development_build
      args:
        DJANGO_ENV: development
    volumes:
      - django-static:/var/www/django/static
    depends_on:
      db:
        condition: service_healthy
    networks:
      - postgres-net
    env_file: ./config/.env
    environment:
      DJANGO_DATABASE_HOST: db
    command: python -We -bb manage.py runserver 0.0.0.0:8000
    healthcheck:
      test: /bin/sh /code/docker/healthcheck.sh
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  # Network for postgres, use it for services that need access to the db:
  postgres-net:

volumes:
  postgres-data:
  django-static:
